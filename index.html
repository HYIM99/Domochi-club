<body>
    <div class="club-card" id="login-card">
        <div class="logo-box"><img src="https://i.ibb.co/gMcnX8yj/IMG-0668.jpg"></div>
        <h1>Dōmochi Club</h1>
        <p class="subtitle">Bentornato! Inserisci il tuo numero.</p>
        
        <div class="form-group">
            <input type="tel" id="login-phone" class="input-field" placeholder="Es. 3520008111">
        </div>
        
        <button class="btn-submit" onclick="checkLogin()">ACCEDI (登录)</button>
        
        <div style="margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px;">
            <p style="font-size: 0.9rem; color: #888;">Non sei ancora membro?</p>
            <a href="register.html" style="color: var(--brand-primary); font-weight: bold; text-decoration: none;">Registrati ora (去注册)</a>
        </div>
    </div>
    <script>
        async function checkLogin() {
            const phone = document.getElementById('login-phone').value.trim();
            // 这里连接你的 Supabase 查询积分逻辑
            const { data } = await supabaseClient.from('domochi_members').select('*').eq('phone', phone).single();
            if (data) { alert("Benvenuto " + data.name + "! Punti: " + data.points); } 
            else { alert("Numero non trovato. (未找到会员，请先注册)"); }
        }
    </script>
</body>
